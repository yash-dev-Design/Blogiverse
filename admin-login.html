<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Blogiverse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="blogger.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <section class="login-section">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Admin Login</h1>
                    <p>Enter your credentials to access the admin panel.</p>
                </div>
                <form class="login-form" id="admin-login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="example@gmail.com" required autocomplete="off" style="border: 1px solid black;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="***********" required style="border: 1px solid black;">
                            <button type="button" class="toggle-password" id="toggle-password">
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="login-btn" id="login-btn">
                        Login
                    </button>
                    <div class="login-error" id="login-error" style="display:none;">
                        <i class="fas fa-exclamation-circle"></i>
                        Invalid email or password.
                    </div>
                </form>
            </div>
        </div>
    </section>

    <div class="login-bg-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('admin-login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('login-error');
            const togglePassword = document.getElementById('toggle-password');

            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.querySelector('i').classList.toggle('fa-eye');
                togglePassword.querySelector('i').classList.toggle('fa-eye-slash');
            });

            // Handle login form submission
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Prevent default form submission

                const email = emailInput.value;
                const password = passwordInput.value;

                // Simple hardcoded authentication
                if (email === 'fake123@gmail.com' && password === '123456789') {
                    // Store a simple "logged in" flag in sessionStorage
                    sessionStorage.setItem('isAdminLoggedIn', 'true');
                    window.location.href = 'admin-panel.html'; // Redirect to admin panel
                } else {
                    loginError.style.display = 'flex'; // Show error message
                }
            });
        });
    </script>
</body>
</html>
